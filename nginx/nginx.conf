server {
    listen 80;
    server_name konditer-app.pro www.konditer-app.pro;

    return 301 https://$host$request_uri;
}

server {
    listen 80;
    server_name natsdoll.com www.natsdoll.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name konditer-app.pro www.konditer-app.pro;

    ssl_certificate     /etc/letsencrypt/live/konditer-app.pro/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/konditer-app.pro/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://server:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    server_name natsdoll.com www.natsdoll.com;

    ssl_certificate     /etc/letsencrypt/live/natsdoll.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/natsdoll.com/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    location / {
        proxy_pass http://host.docker.internal:8081;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
